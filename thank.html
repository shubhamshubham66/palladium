<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Thank You — DestinationPick × Palladium Hotel Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Manrope:wght@300;400;500;600;700&family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ivory:#FFFAF0;--cream:#F7F0E4;--blush:#FBEFF1;
  --sage-l:#C9DADB;--sage:#B2CBC0;--teal:#628487;--teal-d:#4C6A6D;--teal-dd:#2E4546;
  --pink:#F3CDD5;--pink-d:#E2A6B1;--beige:#E7CFA9;--taupe:#8C7C5E;
  --ink:#36504F;--ink2:#4E6A69;--muted:#6E8584;--soft:#93A7A6;
  --serif:'Playfair Display',Georgia,serif;
  --script:'Dancing Script',cursive;
  --sans:'Manrope',system-ui,sans-serif;
}
html{scroll-behavior:smooth}
body{
  font-family:var(--sans);background:var(--ivory);color:var(--ink);
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;padding:2rem;
}
.thank-wrap{
  max-width:600px;width:100%;
  background:var(--teal);border-radius:24px;padding:4rem 3rem;
  box-shadow:0 20px 60px rgba(46,69,70,0.25);
}
.thank-icon{
  font-family:var(--script);font-size:4rem;color:var(--pink);margin-bottom:1rem;line-height:1;
}
.thank-title{
  font-family:var(--serif);font-size:clamp(1.8rem,4vw,2.4rem);font-weight:600;
  color:#FFFDF8;margin-bottom:1rem;
}
.thank-desc{
  font-size:1rem;color:rgba(255,255,255,0.78);line-height:1.8;margin-bottom:2rem;
}
.thank-btn{
  display:inline-block;background:var(--pink);color:var(--teal-dd);
  padding:0.95rem 2.4rem;font-size:0.7rem;font-weight:700;
  letter-spacing:0.16em;text-transform:uppercase;border-radius:100px;
  text-decoration:none;font-family:var(--sans);transition:background .2s,transform .2s;
  box-shadow:0 4px 18px rgba(243,205,213,0.45);
}
.thank-btn:hover{background:#fff;transform:translateY(-2px)}
.logo-chip{margin-bottom:2rem}
.logo-chip img{height:36px;width:auto;object-fit:contain}
</style>
</head>
<body>

<div class="thank-wrap">
  <div class="logo-chip"><img src="https://www.destinationpick.com/images/logo.webp" alt="DestinationPick"/></div>
  <div class="thank-icon">Thank You</div>
  <h1 class="thank-title">Your Enquiry Has Been Received</h1>
  <p class="thank-desc">A Palladium South Asian Wedding Specialist will review your details and respond within 24 business hours.<br/><br/>We're excited to help you plan your dream celebration.</p>
  <a href="index.html" class="thank-btn">← Back to Home</a>
</div>

</body>
</html>
